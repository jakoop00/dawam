<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر يوميات محمص زيتون</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 10px;
        }
        
        @media (min-width: 768px) {
            body { padding: 20px; }
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            width: 100%;
        }
        
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
        }
        
        @media (min-width: 768px) {
            .card { 
                border-radius: 20px; 
                padding: 25px; 
                margin-bottom: 20px; 
            }
        }
        
        .btn { 
            padding: 10px 18px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            transition: all 0.3s; 
            font-family: 'Cairo';
            font-size: 14px;
        }
        
        @media (min-width: 768px) {
            .btn { 
                padding: 12px 24px;
                font-size: 16px;
            }
        }
        
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn:active { transform: translateY(0); }
        
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-family: 'Cairo'; 
            font-size: 16px;
        }
        
        @media (min-width: 768px) {
            input, select, textarea { padding: 12px; }
        }
        
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        @media (min-width: 768px) {
            label { font-size: 16px; }
        }
        
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -16px;
            padding: 0 16px;
        }
        
        @media (min-width: 768px) {
            .table-wrapper {
                margin: 0;
                padding: 0;
            }
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse;
            min-width: 600px;
        }
        
        th { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 12px 8px; 
            text-align: right; 
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
        }
        
        @media (min-width: 768px) {
            th { 
                padding: 15px;
                font-size: 16px;
            }
        }
        
        td { 
            padding: 10px 8px; 
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        
        @media (min-width: 768px) {
            td { 
                padding: 12px;
                font-size: 16px;
            }
        }
        
        /* Grid System - Responsive */
        .grid-4 { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
        }
        
        @media (min-width: 640px) {
            .grid-4 { 
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
        
        @media (min-width: 1024px) {
            .grid-4 { 
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 16px; 
        }
        
        @media (min-width: 768px) {
            .grid-2 { 
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        @media (min-width: 768px) {
            .grid-3 {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        
        @media (min-width: 768px) {
            h1 { font-size: 32px; }
        }
        
        h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }
        
        @media (min-width: 768px) {
            h2 { font-size: 24px; }
        }
        
        h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        @media (min-width: 768px) {
            h3 { font-size: 20px; }
        }
        
        /* للطباعة */
        @media print {
            body { background: white; padding: 0; }
            .btn, .no-print { display: none !important; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
        
        /* تحسينات للموبايل */
        @media (max-width: 639px) {
            .btn {
                width: 100%;
                margin-bottom: 8px;
            }
            
            .btn-group {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ضيف باقي كود الـ HTML الخاص فيك هون -->
        <!-- هذا الجزء CSS بس، لازم تكمل باقي الصفحة من ملفك الأصلي -->
        
        <div class="card">
            <h1><i class="fas fa-book"></i> دفتر يوميات محمص زيتون</h1>
            
            <div class="grid-4">
                <div>
                    <label>التاريخ</label>
                    <input type="date">
                </div>
                <div>
                    <label>الفرع</label>
                    <select>
                        <option>الرئيسي</option>
                        <option>فرع 2</option>
                    </select>
                </div>
                <div>
                    <label>المبيعات</label>
                    <input type="number" placeholder="0.00">
                </div>
                <div>
                    <label>المصروفات</label>
                    <input type="number" placeholder="0.00">
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                <button class="btn btn-success"><i class="fas fa-print"></i> طباعة</button>
                <button class="btn btn-danger"><i class="fas fa-trash"></i> حذف</button>
            </div>
        </div>
        
        <div class="card">
            <h2>السجلات</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الفرع</th>
                            <th>المبيعات</th>
                            <th>المصروفات</th>
                            <th>الصافي</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-07-08</td>
                            <td>الرئيسي</td>
                            <td>1500.00</td>
                            <td>300.00</td>
                            <td>1200.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

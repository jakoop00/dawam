<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الموظف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; color: #000; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .input-label { display: block; color: #000; font-weight: 800; margin-bottom: 8px; font-size: 16px; }
        .input-field { width: 100%; padding: 14px; border: 3px solid #2563eb; border-radius: 12px; font-size: 16px; background: #fff; color: #000; font-weight: 700; }
        .input-field:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        .preview-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px; text-align: center; }
        .image-modal-content { margin: 5% auto; max-width: 90%; max-height: 80vh; }
        .image-modal-content img { width: 100%; height: auto; border-radius: 20px; }
        .close-btn { position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="loader"></div>
                <p class="text-xl text-gray-900 mt-4 font-bold">جاري تحميل بيانات الموظف...</p>
            </div>
        </div>
    </div>

    <!-- نافذة الصورة المنبثقة -->
    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <span class="close-btn" onclick="closeImageModal()">&times;</span>
        <div class="image-modal-content">
            <img id="popupImage" src="" alt="صورة الموظف">
        </div>
    </div>

    <!-- نافذة العمولة -->
    <div id="commissionModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-6 text-gray-900">💰 إضافة عمولة الشهر</h2>
            <div class="space-y-4">
                <div>
                    <label class="input-label">💵 الأرباح (دينار)</label>
                    <input type="number" id="profitInput" placeholder="مثال: 1000" step="0.001" class="input-field">
                </div>
                <div>
                    <label class="input-label">📊 نسبة العمولة %</label>
                    <input type="number" id="percentInput" value="1" step="0.1" class="input-field">
                </div>
                <div class="bg-green-50 border-3 border-green-600 rounded-xl p-4 text-center">
                    <p class="text-sm text-gray-900 font-bold">قيمة العمولة</p>
                    <p class="text-3xl font-bold text-green-700" id="modalCommissionResult">0.000 د.أ</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="saveCommission()" class="flex-1 bg-gradient-to-r from-green-600 to-green-700 text-white py-3 rounded-xl font-bold hover:opacity-90">إضافة العمولة</button>
                    <button onclick="closeCommissionModal()" class="flex-1 bg-gray-500 text-white py-3 rounded-xl font-bold hover:opacity-90">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل السجل -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-6 text-gray-900">✏️ تعديل سجل الدوام</h2>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editRecordId">
                <div>
                    <label class="input-label">📅 التاريخ</label>
                    <input type="date" id="editDate" class="input-field" required>
                </div>
                <div>
                    <label class="input-label">🕐 وقت الدخول</label>
                    <input type="time" id="editCheckIn" class="input-field" required>
                </div>
                <div>
                    <label class="input-label">🕐 وقت الخروج</label>
                    <input type="time" id="editCheckOut" class="input-field" required>
                </div>
                <div>
                    <label class="input-label">⏰ ساعات إضافية</label>
                    <input type="number" id="editOvertime" step="0.5" class="input-field">
                </div>
                <div>
                    <label class="input-label">🎁 مكافآت (دينار)</label>
                    <input type="number" id="editBonus" step="0.001" class="input-field">
                </div>
                <div>
                    <label class="input-label">💸 خصومات (دينار)</label>
                    <input type="number" id="editDeduction" step="0.001" class="input-field">
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-bold hover:opacity-90">حفظ التعديلات</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-500 text-white py-3 rounded-xl font-bold hover:opacity-90">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, getDocs, query, where, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDHbtLO5NbRoDddk7CH0u5jAxC5gOAl1iE",
            authDomain: "employee-dawam.firebaseapp.com",
            projectId: "employee-dawam",
            storageBucket: "employee-dawam.appspot.com",
            messagingSenderId: "682981065867",
            appId: "1:682981065867:web:508227cb2dd596dad6808e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        const employeeId = new URLSearchParams(window.location.search).get('id');
        let employeeData = {};
        let records = [];

        function compressImage(file, maxWidth = 800) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user ||!employeeId) return window.location.href = 'index.html';
            loadData();
        });

        async function loadData() {
            try {
                const empDoc = await getDoc(doc(db, 'employees', employeeId));
                if (!empDoc.exists()) throw new Error('الموظف غير موجود');
                employeeData = empDoc.data();

                const q = query(collection(db, 'attendance'), where('employeeId', '==', employeeId));
                const snapshot = await getDocs(q);
                records = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
                records.sort((a, b) => new Date(b.date) - new Date(a.date));

                renderPage();
            } catch (error) {
                appDiv.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-2xl shadow-xl text-center"><h2 class="text-2xl font-bold text-red-600 mb-4">صار خطأ!</h2><p class="text-gray-900 mb-4 font-bold">${error.message}</p><button onclick="window.location.href='index.html'" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">رجوع للقائمة</button></div>`;
            }
        }

        function calcLive() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const overtime = parseFloat(document.getElementById('overtime').value) || 0;
            const bonus = parseFloat(document.getElementById('bonus').value) || 0;
            const deduction = parseFloat(document.getElementById('deduction').value) || 0;

            if (!checkIn ||!checkOut) {
                document.getElementById('livePreview').innerText = '0.000 د.أ';
                return;
            }

            const start = new Date(`2000-01-01T${checkIn}`);
            const end = new Date(`2000-01-01T${checkOut}`);
            const diffMinutes = (end - start) / 60000;
            if (diffMinutes < 0) {
                document.getElementById('livePreview').innerText = 'خطأ: الخروج قبل الدخول';
                return;
            }
            const baseSalary = diffMinutes / 60;
            const total = baseSalary + overtime + bonus - deduction;
            document.getElementById('livePreview').innerText = total.toFixed(3) + ' د.أ';
        }

        function renderPage() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];

            const todayRecords = records.filter(r => r.date === today);
            const todayTotal = todayRecords.reduce((sum, r) => sum + r.dailyWage, 0);

            const weekRecords = records.filter(r => r.date >= weekAgoStr);
            const weekTotal = weekRecords.reduce((sum, r) => sum + r.dailyWage, 0);

            const monthTotal = records.reduce((sum, r) => sum + r.dailyWage, 0);
            const totalCommission = employeeData.totalCommission || 0;
            const monthWithCommission = monthTotal + totalCommission;

            const defaultImg = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(employeeData.name) + '&background=6c5ce7&color=fff&size=200';

            appDiv.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-5 shadow-xl">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <button onclick="window.location.href='index.html'" class="bg-white text-blue-600 px-5 py-2 rounded-xl font-bold hover:bg-gray-100">← رجوع للقائمة</button>
                        <h1 class="text-2xl font-bold">ملف الموظف</h1>
                        <div class="w-32"></div>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto p-6">
                    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                        <div class="flex items-center gap-6 justify-center">
                            <img src="${employeeData.profileImageUrl || defaultImg}" class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover cursor-pointer hover:opacity-80 transition" id="profileImg" onclick="openImageModal('${employeeData.profileImageUrl || defaultImg}')">
                            <div class="text-center">
                                <h2 class="text-3xl font-bold text-gray-900 mb-2">👤 ${employeeData.name}</h2>
                                <p class="text-gray-700 font-semibold">الرقم الوظيفي: ${employeeData.employeeId} | القسم: ${employeeData.department}</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="text-base opacity-90 font-bold">إجمالي اليوم</p>
                            <h3 class="text-4xl font-bold mt-3">${todayTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="text-base opacity-90 font-bold">إجمالي الأسبوع</p>
                            <h3 class="text-4xl font-bold mt-3">${weekTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="text-base opacity-90 font-bold">إجمالي الشهر</p>
                            <h3 class="text-4xl font-bold mt-3">${monthTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="text-base opacity-90 font-bold">الشهر مع العمولة</p>
                            <h3 class="text-4xl font-bold mt-3">${monthWithCommission.toFixed(3)} د.أ</h3>
                            <p class="text-xs opacity-75 mt-2">العمولة: ${totalCommission.toFixed(3)} د.أ</p>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-2xl p-6 shadow-xl mb-6">
                        <div class="flex justify-center items-center gap-4">
                            <button onclick="openCommissionModal()" class="bg-white text-purple-600 px-8 py-3 rounded-xl font-bold hover:bg-gray-100">💰 إضافة عمولة</button>
                            <button onclick="resetCommission()" class="bg-red-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-red-600">🗑️ حذف العمولة</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-900">➕ إضافة سجل عمل جديد</h3>
                                <div class="preview-box mb-5">
                                    <p class="text-sm opacity-90 mb-2">اجمالي اليوم المتوقع</p>
                                    <p class="text-4xl font-bold" id="livePreview">0.000 د.أ</p>
                                </div>
                                <form id="addForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div>
                                        <label class="input-label">📅 التاريخ</label>
                                        <input type="date" id="date" class="input-field" required>
                                    </div>
                                    <div>
                                        <label class="input-label">🕐 وقت الدخول</label>
                                        <input type="time" id="checkIn" class="input-field" required>
                                    </div>
                                    <div>
                                        <label class="input-label">🕐 وقت الخروج</label>
                                        <input type="time" id="checkOut" class="input-field" required>
                                    </div>
                                    <div>
                                        <label class="input-label">⏰ ساعات إضافية</label>
                                        <input type="number" id="overtime" placeholder="0" value="0" step="0.5" class="input-field">
                                    </div>
                                    <div>
                                        <label class="input-label">🎁 مكافآت (دينار)</label>
                                        <input type="number" id="bonus" placeholder="0" value="0" step="0.001" class="input-field">
                                    </div>
                                    <div>
                                        <label class="input-label">💸 خصومات (دينار)</label>
                                        <input type="number" id="deduction" placeholder="0" value="0" step="0.001" class="input-field">
                                    </div>
                                    <button type="submit" class="md:col-span-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 rounded-xl font-bold hover:opacity-90 text-lg">إضافة السجل وحساب الراتب</button>
                                </form>
                            </div>

                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-900">📊 سجلات العمل</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm">
                                        <thead class="bg-gradient-to-r from-gray-100 to-gray-200">
                                            <tr>
                                                <th class="p-3 text-right font-bold text-gray-900">التاريخ</th>
                                                <th class="p-3 font-bold text-gray-900">الدخول</th>
                                                <th class="p-3 font-bold text-gray-900">الخروج</th>
                                                <th class="p-3 font-bold text-gray-900">المدة</th>
                                                <th class="p-3 font-bold text-gray-900">اضافي</th>
                                                <th class="p-3 font-bold text-gray-900">مكافآت</th>
                                                <th class="p-3 font-bold text-gray-900">خصم</th>
                                                <th class="p-3 font-bold text-gray-900">أجر اليوم</th>
                                                <th class="p-3 font-bold text-gray-900">تعديل</th>
                                                <th class="p-3 font-bold text-gray-900">حذف</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${records.length === 0? '<tr><td colspan="10" class="p-8 text-center text-gray-500 font-bold">لا توجد سجلات بعد</td></tr>' : records.map(r => {
                                                const h = Math.floor(r.minutes/60);
                                                const m = Math.floor(r.minutes%60);
                                                return `<tr class="border-b hover:bg-blue-50">
                                                    <td class="p-3 font-bold text-gray-900">${r.date}</td>
                                                    <td class="p-3 text-gray-900">${r.checkIn}</td>
                                                    <td class="p-3 text-gray-900">${r.checkOut}</td>
                                                    <td class="p-3 font-bold text-blue-700">${h}:${m.toString().padStart(2,'0')}</td>
                                                    <td class="p-3 text-gray-900">${r.overtime}</td>
                                                    <td class="p-3 text-green-700 font-bold">${r.bonus.toFixed(3)}</td>
                                                    <td class="p-3 text-red-700 font-bold">${r.deduction.toFixed(3)}</td>
                                                    <td class="p-3 font-bold text-purple-700">${r.dailyWage.toFixed(3)} د.أ</td>
                                                    <td class="p-3"><button onclick="openEditModal('${r.id}')" class="text-blue-600 hover:underline font-bold">تعديل</button></td>
                                                    <td class="p-3"><button onclick="deleteRecord('${r.id}')" class="text-red-600 hover:underline font-bold">حذف</button></td>
                                                </tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-900">🖼️ الصورة الشخصية</h3>
                                <input type="file" id="profileImage" accept="image/*" class="w-full px-4 py-3 border-2 border-blue-300 rounded-xl mb-3 text-gray-900">
                                <button onclick="saveProfileImage()" class="w-full bg-gradient-to-r from-purple-500 to-purple-600 text-white py-3 rounded-xl font-bold hover:opacity-90">تحديث الصورة</button>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-900">📋 بيانات الهوية</h3>
                                <input type="text" id="idNumber" placeholder="رقم الهوية / التصريح" value="${employeeData.idNumber || ''}" class="w-full px-4 py-3 border-2 border-blue-300 rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-bold">
                                <input type="file" id="idImage" accept="image/*" class="w-full px-4 py-3 border-2 border-blue-300 rounded-xl mb-3 text-gray-900">
                                <button onclick="saveIdData()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:opacity-90 mb-3">حفظ بيانات الهوية</button>
                                ${employeeData.idImageUrl? `<div class="mt-3"><p class="text-sm font-bold text-gray-900 mb-2">صورة الهوية الحالية:</p><img src="${employeeData.idImageUrl}" class="w-full rounded-xl border-2 border-gray-300 cursor-pointer" onclick="openImageModal('${employeeData.idImageUrl}')"></div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('checkIn').addEventListener('input', calcLive);
            document.getElementById('checkOut').addEventListener('input', calcLive);
            document.getElementById('overtime').addEventListener('input', calcLive);
            document.getElementById('bonus').addEventListener('input', calcLive);
            document.getElementById('deduction').addEventListener('input', calcLive);
            document.getElementById('addForm').addEventListener('submit', addRecord);
            document.getElementById('profitInput').addEventListener('input', updateModalCommission);
            document.getElementById('percentInput').addEventListener('input', updateModalCommission);
        }

        window.openImageModal = function(src) {
            document.getElementById('popupImage').src = src;
            document.getElementById('imageModal').style.display = 'block';
        }

        window.closeImageModal = function() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function updateModalCommission() {
            const profit = parseFloat(document.getElementById('profitInput').value) || 0;
            const percent = parseFloat(document.getElementById('percentInput').value) || 0;
            const commission = profit * (percent / 100);
            document.getElementById('modalCommissionResult').innerText = commission.toFixed(3) + ' د.أ';
        }

        window.openCommissionModal = function() {
            document.getElementById('commissionModal').style.display = 'block';
        }

        window.closeCommissionModal = function() {
            document.getElementById('commissionModal').style.display = 'none';
            document.getElementById('profitInput').value = '';
            document.getElementById('percentInput').value = '1';
            document.getElementById('modalCommissionResult').innerText = '0.000 د.أ';
        }

        window.saveCommission = async function() {
            const profit = parseFloat(document.getElementById('profitInput').value) || 0;
            const percent = parseFloat(document.getElementById('percentInput').value) || 0;
            const commission = profit * (percent / 100);
            if (profit <= 0) return alert('اكتب قيمة الارباح');
            if (!confirm(`متأكد تضيف عمولة ${commission.toFixed(3)} د.أ؟`)) return;

            const currentCommission = employeeData.totalCommission || 0;
            await updateDoc(doc(db, 'employees', employeeId), {
                totalCommission: currentCommission + commission
            });
            alert(`تم اضافة عمولة ${commission.toFixed(3)} د.أ ✅`);
            closeCommissionModal();
            loadData();
        }

        window.resetCommission = async function() {
            if (!confirm('متأكد بدك تحذف كل العمولة؟ راح يتصفر اجمالي العمولة!')) return;
            await updateDoc(doc(db, 'employees', employeeId), { totalCommission: 0 });
            alert('تم تصفير العمولة ✅');
            loadData();
        }

        window.saveProfileImage = async function() {
            const file = document.getElementById('profileImage').files[0];
            if (!file) return alert('اختار صورة اول');
            try {
                const base64 = await compressImage(file);
                await updateDoc(doc(db, 'employees', employeeId), { profileImageUrl: base64 });
                alert('تم تحديث الصورة ✅');
                loadData();
            } catch (error) {
                alert('خطأ برفع الصورة: ' + error.message);
            }
        }

        window.saveIdData = async function() {
            const idNumber = document.getElementById('idNumber').value;
            const file = document.getElementById('idImage').files[0];
            try {
                let updateData = { idNumber };
                if (file) {
                    updateData.idImageUrl = await compressImage(file);
                }
                await updateDoc(doc(db, 'employees', employeeId), updateData);
                alert('تم الحفظ ✅');
                loadData();
            } catch (error) {
                alert('خطأ بالحفظ: ' + error.message);
            }
        }

        function calc(checkIn, checkOut, overtime, bonus, deduction) {
            const start = new Date(`2000-01-01T${checkIn}`);
            const end = new Date(`2000-01-01T${checkOut}`);
            const diffMinutes = (end - start) / 60000;
            if (diffMinutes < 0) return null;
            const baseSalary = diffMinutes / 60;
            const over = parseFloat(overtime) || 0;
            const bon = parseFloat(bonus) || 0;
            const ded = parseFloat(deduction) || 0;
            return {
                baseSalary,
                dailyWage: baseSalary + over + bon - ded,
                minutes: diffMinutes
            };
        }

        async function addRecord(e) {
            e.preventDefault();
            try {
                const c = calc(
                    document.getElementById('checkIn').value,
                    document.getElementById('checkOut').value,
                    document.getElementById('overtime').value,
                    document.getElementById('bonus').value,
                    document.getElementById('deduction').value
                );
                if (!c) return alert('وقت الخروج لازم يكون بعد الدخول');

                await addDoc(collection(db, 'attendance'), {
                    employeeId,
                    date: document.getElementById('date').value,
                    checkIn: document.getElementById('checkIn').value,
                    checkOut: document.getElementById('checkOut').value,
                    overtime: parseFloat(document.getElementById('overtime').value) || 0,
                    bonus: parseFloat(document.getElementById('bonus').value) || 0,
                    deduction: parseFloat(document.getElementById('deduction').value) || 0,
                    baseSalary: c.baseSalary,
                    dailyWage: c.dailyWage,
                    minutes: c.minutes,
                    createdAt: new Date().toISOString()
                });
                alert('تم اضافة السجل ✅');
                e.target.reset();
                document.getElementById('livePreview').innerText = '0.000 د.أ';
                loadData();
            } catch (error) {
                alert('خطأ بالاضافة: ' + error.message);
            }
        }

        window.openEditModal = function(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            document.getElementById('editRecordId').value = id;
            document.getElementById('editDate').value = record.date;
            document.getElementById('editCheckIn').value = record.checkIn;
            document.getElementById('editCheckOut').value = record.checkOut;
            document.getElementById('editOvertime').value = record.overtime;
            document.getElementById('editBonus').value = record.bonus;
            document.getElementById('editDeduction').value = record.deduction;
            document.getElementById('editModal').style.display = 'block';
        }

        window.closeEditModal = function() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editRecordId').value;
            const c = calc(
                document.getElementById('editCheckIn').value,
                document.getElementById('editCheckOut').value,
                document.getElementById('editOvertime').value,
                document.getElementById('editBonus').value,
                document.getElementById('editDeduction').value
            );
            if (!c) return alert('وقت الخروج لازم يكون بعد الدخول');

            await updateDoc(doc(db, 'attendance', id), {
                date: document.getElementById('editDate').value,
                checkIn: document.getElementById('editCheckIn').value,
                checkOut: document.getElementById('editCheckOut').value,
                overtime: parseFloat(document.getElementById('editOvertime').value) || 0,
                bonus: parseFloat(document.getElementById('editBonus').value) || 0,
                deduction: parseFloat(document.getElementById('editDeduction').value) || 0,
                baseSalary: c.baseSalary,
                dailyWage: c.dailyWage,
                minutes: c.minutes
            });
            alert('تم تعديل السجل ✅');
            closeEditModal();
            loadData();
        });

        window.deleteRecord = async function(id) {
            if (confirm('متأكد من حذف السجل؟')) {
                await deleteDoc(doc(db, 'attendance', id));
                loadData();
            }
        }
    </script>
</body>
</html>

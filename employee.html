<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الموظف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
     .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
     .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
     .modal-content { background-color: white; margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="loader"></div>
                <p class="text-xl text-gray-600 mt-4">جاري تحميل بيانات الموظف...</p>
            </div>
        </div>
    </div>

    <!-- نافذة العمولة -->
    <div id="commissionModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">💰 إضافة عمولة الشهر</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">الأرباح (دينار)</label>
                    <input type="number" id="profitInput" placeholder="مثال: 1000" step="0.001" class="w-full px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">نسبة العمولة %</label>
                    <input type="number" id="percentInput" value="1" step="0.1" class="w-full px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="bg-green-50 border-2 border-green-500 rounded-xl p-4 text-center">
                    <p class="text-sm text-gray-600">قيمة العمولة</p>
                    <p class="text-3xl font-bold text-green-600" id="modalCommissionResult">0.000 د.أ</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="saveCommission()" class="flex-1 bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:opacity-90">إضافة العمولة</button>
                    <button onclick="closeCommissionModal()" class="flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold hover:opacity-90">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, getDocs, query, where, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDHbtLO5NbRoDddk7CH0u5jAxC5gOAl1iE",
            authDomain: "employee-dawam.firebaseapp.com",
            projectId: "employee-dawam",
            storageBucket: "employee-dawam.appspot.com",
            messagingSenderId: "682981065867",
            appId: "1:682981065867:web:508227cb2dd596dad6808e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appDiv = document.getElementById('app');

        const employeeId = new URLSearchParams(window.location.search).get('id');
        let employeeData = {};
        let records = [];

        onAuthStateChanged(auth, (user) => {
            if (!user ||!employeeId) return window.location.href = 'index.html';
            loadData();
        });

        async function loadData() {
            try {
                const empDoc = await getDoc(doc(db, 'employees', employeeId));
                if (!empDoc.exists()) throw new Error('الموظف غير موجود');
                employeeData = empDoc.data();

                const q = query(collection(db, 'attendance'), where('employeeId', '==', employeeId));
                const snapshot = await getDocs(q);
                records = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
                records.sort((a, b) => new Date(b.date) - new Date(a.date));

                renderPage();
            } catch (error) {
                appDiv.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-2xl shadow-xl text-center"><h2 class="text-2xl font-bold text-red-600 mb-4">صار خطأ!</h2><p class="text-gray-600 mb-4">${error.message}</p><button onclick="window.location.href='index.html'" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">رجوع للقائمة</button></div></div>`;
            }
        }

        function renderPage() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];

            // اجمالي اليوم = مجموع الكل
            const todayRecords = records.filter(r => r.date === today);
            const todayTotal = todayRecords.reduce((sum, r) => sum + r.dailyWage, 0);

            const weekRecords = records.filter(r => r.date >= weekAgoStr);
            const weekTotal = weekRecords.reduce((sum, r) => sum + r.dailyWage, 0);

            const monthTotal = records.reduce((sum, r) => sum + r.dailyWage, 0);
            
            // اجمالي الشهر مع العمولة
            const totalCommission = employeeData.totalCommission || 0;
            const monthWithCommission = monthTotal + totalCommission;

            const defaultImg = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(employeeData.name) + '&background=6c5ce7&color=fff&size=200';

            appDiv.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-5 shadow-xl">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <button onclick="window.location.href='index.html'" class="bg-white text-blue-600 px-5 py-2 rounded-xl font-bold hover:bg-gray-100">← رجوع للقائمة</button>
                        <h1 class="text-2xl font-bold">ملف الموظف</h1>
                        <div class="w-32"></div>
                    </div>
                <div class="max-w-7xl mx-auto p-6">
                    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                        <div class="flex items-center gap-6">
                            <img src="${employeeData.profileImageUrl || defaultImg}" class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover">
                            <div>
                                <h2 class="text-3xl font-bold text-gray-800 mb-2">👤 ${employeeData.name}</h2>
                                <p class="text-gray-600">الرقم الوظيفي: ${employeeData.employeeId} | القسم: ${employeeData.department}</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-6 text-center shadow-xl">
                            <p class="text-sm opacity-90">إجمالي اليوم</p>
                            <h3 class="text-3xl font-bold mt-2">${todayTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-2xl p-6 text-center shadow-xl">
                            <p class="text-sm opacity-90">إجمالي الأسبوع</p>
                            <h3 class="text-3xl font-bold mt-2">${weekTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-6 text-center shadow-xl">
                            <p class="text-sm opacity-90">إجمالي الشهر</p>
                            <h3 class="text-3xl font-bold mt-2">${monthTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-2xl p-6 text-center shadow-xl md:col-span-4">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="text-sm opacity-90">اجمالي الشهر مع العمولة</p>
                                    <h3 class="text-4xl font-bold mt-2">${monthWithCommission.toFixed(3)} د.أ</h3>
                                    <p class="text-xs opacity-75 mt-1">العمولة المضافة: ${totalCommission.toFixed(3)} د.أ</p>
                                </div>
                                <button onclick="openCommissionModal()" class="bg-white text-purple-600 px-6 py-3 rounded-xl font-bold hover:bg-gray-100">💰 إضافة عمولة</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-800">➕ إضافة سجل عمل جديد</h3>
                                <form id="addForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="date" id="date" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <input type="time" id="checkIn" placeholder="وقت الدخول" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <input type="time" id="checkOut" placeholder="وقت الخروج" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <input type="number" id="overtime" placeholder="ساعات إضافية" value="0" step="0.5" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                                    <input type="number" id="bonus" placeholder="مكافآت (دينار)" value="0" step="0.001" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                                    <input type="number" id="deduction" placeholder="خصومات (دينار)" value="0" step="0.001" class="px-4 py-3 border-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                                    <button type="submit" class="md:col-span-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-bold hover:opacity-90">إضافة السجل وحساب الراتب</button>
                                </form>
                            </div>

                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-800">📊 سجلات العمل</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm">
                                        <thead class="bg-gradient-to-r from-gray-100 to-gray-200">
                                            <tr>
                                                <th class="p-3 text-right">التاريخ</th>
                                                <th class="p-3">الدخول</th>
                                                <th class="p-3">الخروج</th>
                                                <th class="p-3">المدة</th>
                                                <th class="p-3">اضافي</th>
                                                <th class="p-3">مكافآت</th>
                                                <th class="p-3">خصم</th>
                                                <th class="p-3">أجر اليوم</th>
                                                <th class="p-3">حذف</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${records.length === 0? '<tr><td colspan="9" class="p-8 text-center text-gray-400">لا توجد سجلات بعد</td></tr>' : records.map(r => {
                                                const h = Math.floor(r.minutes/60);
                                                const m = Math.floor(r.minutes%60);
                                                return `<tr class="border-b hover:bg-blue-50">
                                                    <td class="p-3">${r.date}</td>
                                                    <td class="p-3">${r.checkIn}</td>
                                                    <td class="p-3">${r.checkOut}</td>
                                                    <td class="p-3">${h}:${m.toString().padStart(2,'0')}</td>
                                                    <td class="p-3">${r.overtime}</td>
                                                    <td class="p-3">${r.bonus.toFixed(3)}</td>
                                                    <td class="p-3">${r.deduction.toFixed(3)}</td>
                                                    <td class="p-3 font-bold">${r.dailyWage.toFixed(3)} د.أ</td>
                                                    <td class="p-3"><button onclick="deleteRecord('${r.id}')" class="text-red-600 hover:underline font-bold">حذف</button></td>
                                                </tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-800">🖼️ الصورة الشخصية</h3>
                                <input type="file" id="profileImage" accept="image/*" class="w-full px-4 py-3 border-2 rounded-xl mb-3">
                                <button onclick="saveProfileImage()" class="w-full bg-gradient-to-r from-purple-500 to-purple-600 text-white py-3 rounded-xl font-bold hover:opacity-90">تحديث الصورة</button>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6">
                                <h3 class="text-xl font-bold mb-4 text-gray-800">📋 بيانات الهوية</h3>
                                <input type="text" id="idNumber" placeholder="رقم الهوية / التصريح" value="${employeeData.idNumber || ''}" class="w-full px-4 py-3 border-2 rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                                <input type="file" id="idImage" accept="image/*" class="w-full px-4 py-3 border-2 rounded-xl mb-3">
                                <button onclick="saveIdData()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:opacity-90">حفظ بيانات الهوية</button>
                                ${employeeData.idImageUrl? `<img src="${employeeData.idImageUrl}" class="w-full mt-4 rounded-xl border-2 border-gray-200">` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('addForm').addEventListener('submit', addRecord);
            
            // حساب العمولة بالنافذة
            document.getElementById('profitInput').addEventListener('input', updateModalCommission);
            document.getElementById('percentInput').addEventListener('input', updateModalCommission);
        }

        function updateModalCommission() {
            const profit = parseFloat(document.getElementById('profitInput').value) || 0;
            const percent = parseFloat(document.getElementById('percentInput').value) || 0;
            const commission = profit * (percent / 100);
            document.getElementById('modalCommissionResult').innerText = commission.toFixed(3) + ' د.أ';
        }

        window.openCommissionModal = function() {
            document.getElementById('commissionModal').style.display = 'block';
        }

        window.closeCommissionModal = function() {
            document.getElementById('commissionModal').style.display = 'none';
            document.getElementById('profitInput').value = '';
            document.getElementById('percentInput').value = '1';
            document.getElementById('modalCommissionResult').innerText = '0.000 د.أ';
        }

        window.saveCommission = async function() {
            const profit = parseFloat(document.getElementById('profitInput').value) || 0;
            const percent = parseFloat(document.getElementById('percentInput').value) || 0;
            const commission = profit * (percent / 100);
            
            if (profit <= 0) return alert('اكتب قيمة الارباح');

            const currentCommission = employeeData.totalCommission || 0;
            await updateDoc(doc(db, 'employees', employeeId), {
                totalCommission: currentCommission + commission
            });
            
            alert(`تم اضافة عمولة ${commission.toFixed(3)} د.أ ✅`);
            closeCommissionModal();
            loadData();
        }

        window.saveProfileImage = async function() {
            const file = document.getElementById('profileImage').files[0];
            if (!file) return alert('اختار صورة اول');
            const ref = storage.ref(`profiles/${employeeId}_${Date.now()}`);
            await uploadBytes(ref, file);
            const url = await getDownloadURL(ref);
            await updateDoc(doc(db, 'employees', employeeId), { profileImageUrl: url });
            alert('تم تحديث الصورة ✅');
            loadData();
        }

        window.saveIdData = async function() {
            const idNumber = document.getElementById('idNumber').value;
            const file = document.getElementById('idImage').files[0];
            let updateData = { idNumber };
            if (file) {
                const ref = storage.ref(`ids/${employeeId}_${Date.now()}`);
                await uploadBytes(ref, file);
                updateData.idImageUrl = await getDownloadURL(ref);
            }
            await updateDoc(doc(db, 'employees', employeeId), updateData);
            alert('تم الحفظ ✅');
            loadData();
        }

        function calc(checkIn, checkOut, overtime, bonus, deduction) {
            const start = new Date(`2000-01-01T${checkIn}`);
            const end = new Date(`2000-01-01T${checkOut}`);
            const diffMinutes = (end - start) / 60000;
            if (diffMinutes < 0) return null;
            const baseSalary = diffMinutes / 60;
            const over = parseFloat(overtime) || 0;
            const bon = parseFloat(bonus) || 0;
            const ded = parseFloat(deduction) || 0;
            return {
                baseSalary,
                dailyWage: baseSalary + over + bon - ded,
                minutes: diffMinutes
            };
        }

        async function addRecord(e) {
            e.preventDefault();
            try {
                const c = calc(
                    document.getElementById('checkIn').value,
                    document.getElementById('checkOut').value,
                    document.getElementById('overtime').value,
                    document.getElementById('bonus').value,
                    document.getElementById('deduction').value
                );
                if (!c) return alert('وقت الخروج لازم يكون بعد الدخول');

                await addDoc(collection(db, 'attendance'), {
                    employeeId,
                    date: document.getElementById('date').value,
                    checkIn: document.getElementById('checkIn').value,
                    checkOut: document.getElementById('checkOut').value,
                    overtime: parseFloat(document.getElementById('overtime').value) || 0,
                    bonus: parseFloat(document.getElementById('bonus').value) || 0,
                    deduction: parseFloat(document.getElementById('deduction').value) || 0,
                    baseSalary: c.baseSalary,
                    dailyWage: c.dailyWage,
                    minutes: c.minutes,
                    createdAt: new Date().toISOString()
                });
                alert('تم اضافة السجل ✅');
                e.target.reset();
                loadData();
            } catch (error) {
                alert('خطأ بالاضافة: ' + error.message);
            }
        }

        window.deleteRecord = async function(id) {
            if (confirm('متأكد من حذف السجل؟')) {
                await deleteDoc(doc(db, 'attendance', id));
                loadData();
            }
        }
    </script>
</body>
</html>

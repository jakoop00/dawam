<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الموظف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        * { transition: background-color 0.3s; }
        body { font-family: 'Tajawal', sans-serif; }
     .dark body { background: #0f172a; color: #e2e8f0; }
     .loader { border: 4px solid #f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
     .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
     .modal-content { background-color: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
     .dark.modal-content { background-color: #1e293b; }
     .input-field { width: 100%; padding: 14px; border: 3px solid #2563eb; border-radius: 12px; font-size: 16px; background: #fff; font-weight: 700; }
     .dark.input-field { background: #334155; border-color: #475569; color: #e2e8f0; }
     .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 16px 24px; border-radius: 12px; font-weight: bold; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
     .toast.success { background: #10b981; color: white; }
     .toast.error { background: #ef4444; color: white; }
     .toast.warning { background: #f59e0b; color: white; }
     .btn-loading { position: relative; pointer-events: none; opacity: 0.7; }
     .btn-loading::after { content: ''; position: absolute; width: 16px; height: 16px; top: 50%; left: 50%; margin-left: -8px; margin-top: -8px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @media (max-width: 768px) {.desktop-table { display: none; }.mobile-cards { display: block; } }
        @media (min-width: 769px) {.mobile-cards { display: none; } }
        @media print {.no-print { display: none!important; } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen dark:from-slate-900 dark:to-slate-800">
    <div id="toastContainer"></div>
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="loader"></div>
                <p class="text-xl font-bold mt-4">جاري تحميل بيانات الموظف...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDHbtLO5NbRoDddk7CH0u5jAxC5gOAl1iE",
            authDomain: "employee-dawam.firebaseapp.com",
            projectId: "employee-dawam",
            storageBucket: "employee-dawam.appspot.com",
            messagingSenderId: "682981065867",
            appId: "1:682981065867:web:508227cb2dd596dad6808e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appDiv = document.getElementById('app');

        const employeeId = new URLSearchParams(window.location.search).get('id');
        let employeeData = {};
        let records = [];
        let unsubscribeEmployee = null;
        let unsubscribeAttendance = null;

        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        auth.onAuthStateChanged((user) => {
            if (!user ||!employeeId) {
                showToast('لازم تسجل دخول + تحط id الموظف بالرابط', 'error');
                return;
            }
            setupRealtimeListeners();
        });

        function setupRealtimeListeners() {
            unsubscribeEmployee = db.collection('employees').doc(employeeId).onSnapshot((docSnap) => {
                if (docSnap.exists) {
                    employeeData = docSnap.data();
                    renderPage();
                } else {
                    showToast('الموظف غير موجود', 'error');
                }
            });

            unsubscribeAttendance = db.collection('attendance').where('employeeId', '==', employeeId).onSnapshot((snapshot) => {
                records = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
                records.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPage();
            });
        }

        function calc(checkIn, checkOut, overtime, bonus, deduction) {
            let start = new Date(`2000-01-01T${checkIn}`);
            let end = new Date(`2000-01-01T${checkOut}`);
            if (end < start) end = new Date(`2000-01-02T${checkOut}`);
            const diffMinutes = (end - start) / 60000;
            const baseSalary = diffMinutes / 60;
            const over = parseFloat(overtime) || 0;
            const bon = parseFloat(bonus) || 0;
            const ded = parseFloat(deduction) || 0;
            return {
                baseSalary,
                dailyWage: baseSalary + over + bon - ded,
                minutes: diffMinutes
            };
        }

        function renderPage() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];

            const todayTotal = records.filter(r => r.date === today).reduce((sum, r) => sum + r.dailyWage, 0);
            const weekTotal = records.filter(r => r.date >= weekAgoStr).reduce((sum, r) => sum + r.dailyWage, 0);
            const monthTotal = records.reduce((sum, r) => sum + r.dailyWage, 0);
            const totalCommission = employeeData.totalCommission || 0;
            const defaultImg = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(employeeData.name) + '&background=6c5ce7&color=fff&size=200';

            appDiv.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-5 shadow-xl no-print">
                    <div class="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
                        <button onclick="window.location.href='index.html'" class="bg-white text-blue-600 px-5 py-2 rounded-xl font-bold">← رجوع</button>
                        <h1 class="text-2xl font-bold">ملف الموظف</h1>
                        <button onclick="toggleDarkMode()" class="bg-white text-blue-600 px-4 py-2 rounded-xl font-bold">🌓</button>
                    </div>
                <div class="max-w-7xl mx-auto p-6">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-6 mb-6">
                        <div class="flex items-center gap-6 justify-center flex-wrap">
                            <img src="${employeeData.profileImageUrl || defaultImg}" class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover">
                            <div class="text-center">
                                <h2 class="text-3xl font-bold mb-2">👤 ${employeeData.name}</h2>
                                <p class="font-semibold">الرقم: ${employeeData.employeeId} | القسم: ${employeeData.department}</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="font-bold">إجمالي اليوم</p>
                            <h3 class="text-4xl font-bold mt-3">${todayTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="font-bold">إجمالي الأسبوع</p>
                            <h3 class="text-4xl font-bold mt-3">${weekTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="font-bold">إجمالي الشهر</p>
                            <h3 class="text-4xl font-bold mt-3">${monthTotal.toFixed(3)} د.أ</h3>
                        </div>
                        <div class="bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-2xl p-8 text-center shadow-xl">
                            <p class="font-bold">الشهر مع العمولة</p>
                            <h3 class="text-4xl font-bold mt-3">${(monthTotal + totalCommission).toFixed(3)} د.أ</h3>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-6">
                        <h3 class="text-xl font-bold mb-4">📊 سجلات العمل - ${records.length} سجل</h3>
                        <div class="overflow-x-auto desktop-table">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-100 dark:bg-slate-700">
                                    <tr>
                                        <th class="p-3 text-right font-bold">التاريخ</th>
                                        <th class="p-3 font-bold">الدخول</th>
                                        <th class="p-3 font-bold">الخروج</th>
                                        <th class="p-3 font-bold">المدة</th>
                                        <th class="p-3 font-bold">أجر اليوم</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${records.length === 0? '<tr><td colspan="5" class="p-8 text-center font-bold">لا توجد سجلات</td></tr>' : records.map(r => {
                                        const h = Math.floor(r.minutes/60);
                                        const m = Math.floor(r.minutes%60);
                                        return `<tr class="border-b">
                                            <td class="p-3 font-bold">${r.date}</td>
                                            <td class="p-3">${r.checkIn}</td>
                                            <td class="p-3">${r.checkOut}</td>
                                            <td class="p-3 font-bold text-blue-700">${h}:${m.toString().padStart(2,'0')}</td>
                                            <td class="p-3 font-bold text-purple-700">${r.dailyWage.toFixed(3)} د.أ</td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>

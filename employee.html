<style>
.monthly-summary {
    display: inline-flex;
    align-items: center;
    gap: 15px;
    margin: 15px 10px;
    padding: 10px 15px;
    background: #f5f5f5;
    border-radius: 8px;
}
.monthly-summary select,.monthly-summary input {
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.total-display {
    color: #1976D2;
    font-weight: bold;
    font-size: 18px;
}
</style>

<span class="monthly-summary">
    <label>الشهر:</label>
    <select id="monthSelect">
        <option value="01">يناير</option><option value="02">فبراير</option><option value="03">مارس</option>
        <option value="04">أبريل</option><option value="05">مايو</option><option value="06">يونيو</option>
        <option value="07" selected>يوليو</option><option value="08">أغسطس</option><option value="09">سبتمبر</option>
        <option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option>
    </select>
    <label>السنة:</label>
    <input type="number" id="yearSelect" value="2026" min="2020" max="2030" style="width:70px;">
    <b>مجموع الساعات:</b> <span id="monthlyTotalHours" class="total-display">0 ساعة</span>
</span>

<script>
function parseTimeToMinutes(timeStr) {
    timeStr = String(timeStr).trim();
    if (!timeStr) return 0;
    if (timeStr.includes(':')) {
        const p = timeStr.split(':');
        return (parseInt(p[0])||0)*60 + (parseInt(p[1])||0);
    }
    const h = timeStr.match(/(\d+(?:\.\d+)?)\s*ساعة/);
    const m = timeStr.match(/(\d+)\s*دقيقة/);
    if (h || m) return Math.round((h?parseFloat(h[1]):0)*60 + (m?parseInt(m[1]):0));
    const n = parseFloat(timeStr.replace(/[^\d.]/g,''));
    return isNaN(n)?0:Math.round(n*60);
}

function formatMinutes(t) {
    const h = Math.floor(t/60), m = t%60;
    return m===0?`${h} ساعة`:`${h} ساعة و ${m} دقيقة`;
}

function getColIdx(table, keys) {
    const headers = table.querySelectorAll('thead th');
    for (let i=0; i<headers.length; i++) {
        const txt = headers[i].textContent.trim();
        for (let k of keys) if (txt.includes(k)) return i;
    }
    return -1;
}

function updateMonthlyData() {
    const month = document.getElementById('monthSelect').value;
    const year = document.getElementById('yearSelect').value;
    const prefix = `${year}-${month}`;
    let totalMin = 0;

    const table = document.querySelector('table');
    if (!table) return;

    const dateIdx = getColIdx(table, ['التاريخ','تاريخ']);
    const durIdx = getColIdx(table, ['المدة','نهاري','ليلي','الوقت','24']);

    if (dateIdx===-1 || durIdx===-1) return;

    table.querySelectorAll('tbody tr').forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length > Math.max(dateIdx, durIdx)) {
            const d = cells[dateIdx].textContent.trim();
            if (d.startsWith(prefix)) {
                totalMin += parseTimeToMinutes(cells[durIdx].textContent);
            }
        }
    });

    document.getElementById('monthlyTotalHours').textContent = formatMinutes(totalMin);
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('monthSelect').addEventListener('change', updateMonthlyData);
    document.getElementById('yearSelect').addEventListener('change', updateMonthlyData);
    updateMonthlyData();
});
</script>

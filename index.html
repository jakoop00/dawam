<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام دوام الموظفين - jakoop.tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="min-h-screen"></div>

    <!-- IMPORTANT: Move firebaseConfig to env vars. Set Firestore rules: allow read, write: if request.auth != null; -->
<script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy, where, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDHbtLO5NbRoDddk7CH0u5jAxC5gOAl1iE",
            authDomain: "employee-dawam.firebaseapp.com",
            projectId: "employee-dawam",
            storageBucket: "employee-dawam.appspot.com",
            messagingSenderId: "682981065867",
            appId: "1:682981065867:web:508227cb2dd596dad6808e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');
        let employees = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await loadEmployees();
                renderDashboard();
            } else {
                renderLogin();
            }
        });

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-600 to-purple-700">
                    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
                        <h1 class="text-3xl font-bold text-center mb-2 text-gray-800">نظام دوام الموظفين</h1>
                        <p class="text-center text-gray-500 mb-6">jakoop.tech</p>
                        <form id="loginForm" class="space-y-4">
                            <input type="email" id="email" placeholder="الإيميل" class="w-full px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <input type="password" id="password" placeholder="كلمة المرور" class="w-full px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-bold hover:opacity-90 transition">تسجيل دخول</button>
                        </form>
                        <div id="loginError" class="text-red-500 text-sm mt-4 text-center"></div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                } catch (error) {
                    document.getElementById('loginError').textContent = 'الإيميل أو كلمة المرور غلط';
                }
            });
        }

        async function loadEmployees() {
            const q = query(collection(db, 'employees'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            employees = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
        }

        function renderDashboard() {
            appDiv.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-5 shadow-xl">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <h1 class="text-2xl font-bold">🕐 نظام دوام الموظفين - jakoop.tech</h1>
                        <div class="flex gap-4 items-center">
                            <span class="text-sm bg-white/20 px-3 py-1 rounded-full">${auth.currentUser.email}</span>
                            <button id="logoutBtn" class="bg-red-500 px-5 py-2 rounded-xl hover:bg-red-600 font-bold transition">تسجيل خروج</button>
                        </div>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto p-6">
                    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                        <h2 class="text-xl font-bold mb-4 text-gray-800">➕ إضافة موظف جديد</h2>
                        <form id="addEmployeeForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <input type="text" id="empName" placeholder="اسم الموظف *" class="px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <input type="text" id="empId" placeholder="الرقم الوظيفي *" class="px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <input type="text" id="empDept" placeholder="القسم *" class="px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <button type="submit" id="submitBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:opacity-90 transition">إضافة موظف</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-2xl shadow-xl p-6">
                        <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
                            <h2 class="text-xl font-bold text-gray-800">👥 قائمة الموظفين: ${employees.length}</h2>
                            <div class="flex gap-3 flex-wrap">
                                <button id="backupBtn" class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-5 py-2 rounded-xl hover:opacity-90 font-bold">💾 تصدير نسخة احتياطية</button>
                                <label class="bg-gradient-to-r from-amber-500 to-orange-600 text-white px-5 py-2 rounded-xl hover:opacity-90 font-bold cursor-pointer">
                                    📥 استيراد نسخة احتياطية
                                    <input type="file" id="restoreInput" accept=".json" class="hidden">
                                </label>
                                <button id="exportBtn" class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-2 rounded-xl hover:opacity-90 font-bold">تصدير Excel</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gradient-to-r from-gray-100 to-gray-200">
                                    <tr>
                                        <th class="p-4 text-right font-bold text-gray-700">الاسم</th>
                                        <th class="p-4 text-right font-bold text-gray-700">الرقم الوظيفي</th>
                                        <th class="p-4 text-right font-bold text-gray-700">القسم</th>
                                        <th class="p-4 text-center font-bold text-gray-700">الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${employees.length === 0? '<tr><td colspan="4" class="p-8 text-center text-gray-400">لا يوجد موظفين حالياً</td></tr>' : employees.map(emp => `
                                        <tr class="border-b hover:bg-blue-50 transition">
                                            <td class="p-4 font-bold text-gray-800">${emp.name}</td>
                                            <td class="p-4 text-gray-600">${emp.employeeId}</td>
                                            <td class="p-4 text-gray-600">${emp.department || '-'}</td>
                                            <td class="p-4">
                                                <div class="flex gap-2 justify-center">
                                                    <button onclick="openEmployee('${emp.id}')" class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-5 py-2 rounded-xl hover:opacity-90 font-bold text-sm">عرض الملف 👁️</button>
                                                    <button onclick="deleteEmployee('${emp.id}')" class="bg-gradient-to-r from-red-500 to-red-600 text-white px-5 py-2 rounded-xl hover:opacity-90 font-bold text-sm">حذف 🗑️</button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
            document.getElementById('addEmployeeForm').addEventListener('submit', handleAddEmployee);
            document.getElementById('exportBtn').addEventListener('click', exportToExcel);
            document.getElementById('backupBtn').addEventListener('click', exportBackup);
            document.getElementById('restoreInput').addEventListener('change', importBackup);
        }

        async function handleAddEmployee(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'جاري الحفظ...';
            try {
                await addDoc(collection(db, 'employees'), {
                    name: document.getElementById('empName').value,
                    employeeId: document.getElementById('empId').value,
                    department: document.getElementById('empDept').value,
                    createdAt: new Date().toISOString()
                });
                await loadEmployees();
                renderDashboard();
            } catch (error) {
                alert('صار خطأ: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = 'إضافة موظف';
            }
        }

        window.openEmployee = (id) => {
            window.location.href = `employee.html?id=${id}`;
        }

        window.deleteEmployee = async (id) => {
            if (confirm('متأكد بدك تحذف الموظف؟ راح ينحذف كل دوامه!')) {
                await deleteDoc(doc(db, 'employees', id));
                await loadEmployees();
                renderDashboard();
            }
        }

        function exportToExcel() {
            const data = employees.map(e => ({
                'الاسم': e.name,
                'الرقم الوظيفي': e.employeeId,
                'القسم': e.department || '',
                'تاريخ الإضافة': new Date(e.createdAt).toLocaleDateString('ar-JO')
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الموظفين');
            XLSX.writeFile(wb, `employees_${Date.now()}.xlsx`);
        }

        // 1. تصدير نسخة احتياطية
        async function exportBackup() {
            const backupBtn = document.getElementById('backupBtn');
            backupBtn.disabled = true;
            backupBtn.innerHTML = '⏳ جاري تجهيز النسخة...';
            
            try {
                // 1. جيب كل الموظفين
                const empSnap = await getDocs(collection(db, 'employees'));
                const employeesData = empSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 2. جيب كل سجلات الدوام - عدل اسم الـ collection اذا مختلف
                const attendanceSnap = await getDocs(collection(db, 'attendance'));
                const attendanceData = attendanceSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 3. جيب الملفات اذا عندك collection اسمه files
                let filesData = [];
                try {
                    const filesSnap = await getDocs(collection(db, 'files'));
                    filesData = filesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                } catch(e) { console.log('No files collection') }

                const backup = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    system: 'jakoop.tech',
                    employees: employeesData,
                    attendance: attendanceData,
                    files: filesData
                };

                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_dawam_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                alert('✅ تم تصدير النسخة الاحتياطية بنجاح');
            } catch (error) {
                alert('❌ صار خطأ بالتصدير: ' + error.message);
            } finally {
                backupBtn.disabled = false;
                backupBtn.innerHTML = '💾 تصدير نسخة احتياطية';
            }
        }

        // 2. استيراد نسخة احتياطية
        async function importBackup(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!confirm('⚠️ تنبيه: الاستيراد رح يضيف البيانات الموجودة بالملف. البيانات المتشابهة ممكن تتكرر. متأكد تكمل؟')) {
                e.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const backup = JSON.parse(event.target.result);
                    if (!backup.employees) throw new Error('الملف غير صالح');

                    const loadingMsg = document.createElement('div');
                    loadingMsg.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl z-50';
                    loadingMsg.innerHTML = '⏳ جاري الاستيراد... لا تسكر الصفحة';
                    document.body.appendChild(loadingMsg);

                    // 1. استيراد الموظفين
                    for (const emp of backup.employees) {
                        const { id, ...empData } = emp;
                        await setDoc(doc(db, 'employees', id), empData);
                    }

                    // 2. استيراد سجلات الدوام
                    if (backup.attendance) {
                        for (const att of backup.attendance) {
                            const { id, ...attData } = att;
                            await setDoc(doc(db, 'attendance', id), attData);
                        }
                    }

                    // 3. استيراد الملفات
                    if (backup.files) {
                        for (const f of backup.files) {
                            const { id, ...fileData } = f;
                            await setDoc(doc(db, 'files', id), fileData);
                        }
                    }

                    document.body.removeChild(loadingMsg);
                    alert(`✅ تم الاستيراد بنجاح!\nالموظفين: ${backup.employees.length}\nالسجلات: ${backup.attendance?.length || 0}`);
                    await loadEmployees();
                    renderDashboard();
                } catch (error) {
                    alert('❌ فشل الاستيراد: ' + error.message);
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
